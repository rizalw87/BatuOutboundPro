<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1b7a3d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#28a745;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background Circle -->
  <circle cx="50" cy="50" r="48" fill="url(#grad)" />
  <!-- Mountain -->
  <polygon points="50,18 80,65 20,65" fill="#fff" opacity="0.95"/>
  <polygon points="50,18 65,48 35,48" fill="#e8f5e9" opacity="0.5"/>
  <!-- Snow Cap -->
  <polygon points="50,18 58,30 42,30" fill="#ffffff"/>
  <!-- Trees -->
  <polygon points="28,65 32,50 36,65" fill="#fff" opacity="0.8"/>
  <polygon points="64,65 68,50 72,65" fill="#fff" opacity="0.8"/>
  <!-- Base Line -->
  <rect x="15" y="65" width="70" height="4" rx="2" fill="#fff" opacity="0.7"/>
  <!-- Text "B" -->
  <text x="50" y="86" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#fff" text-anchor="middle">BOP</text>
</svg>
